<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0e5f66" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التحقق من الدخول</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card-box text-center shadow">
        <!-- 🔹 الشعارات -->
        <div
          class="logos d-flex align-items-center justify-content-center mb-4"
        >
          <div class="logo-item text-center">
            <img src="img/logo1.png" alt="logo1" />
          </div>

          <div class="divider mx-3"></div>

          <div class="logo-item text-center">
            <img src="img/logo2.png" alt="logo2" />
          </div>
        </div>

        <!-- 🔹 النص -->
        <h4 class="main-text mb-4">
          رأيـــــــك يـهـمـنـا <br />
          ومــشــاركـتـك تـصـنـع الـتـغـيـيـر
        </h4>

        <!-- 🔹 الإدخال -->
        <input
          type="text"
          id="codeInput"
          class="form-control mb-3 input-custom"
          placeholder="أدخـل رمز التحقق"
        />

        <!-- 🔹 الزر -->
        <button type="button" class="btn btn-custom w-100">مـتـابـعـة</button>

        <p id="message" class="mt-3"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
